plugins {
    id 'org.sonarqube' version '7.3.1.8318'
    id 'com.diffplug.spotless' version '8.7.0'
    id 'org.cyclonedx.bom' version '3.2.4'
    id 'test-report-aggregation'
    id 'jacoco'
}

ext {
    intygClinicalprocessSchemasVersion = "1.2.0.2"
    intygClinicalprocessSchematronVersion = "1.2.0.2"
    intygTransportstyrelsenSchemasVersion = "1.2.0.2"
    rivtaClinicalprocessSchemasVersion = "4.0.5.6"
    rivtaInsuranceprocessSchemasVersion = "3.1.0.5.5"
    schemasContractVersion = "2.3.0.2"

    autovalueVersion = "1.11.1"
    cxfVersion = "4.2.2"
    commonsCollectionsVersion = "4.5.0"
    commonsTextVersion = "1.15.0"
    commonsCsvVersion = "1.14.1"
    commonsIoVersion = "2.22.0"
    equalsVerifierVersion = "4.5"
    guavaVersion = "33.6.0-jre"
    googleJavaFormatVersion = "1.35.0"
    itextVersion = "5.5.13.5"
    itext7Version = "7.2.6"
    itextPdfHtmlVersion = "5.0.5"
    jakartaJwsApiVersion = "3.0.0"
    jaxb2Version = "3.0.0"
    nashornVersion = "15.7"
    phSchematronVersion = "9.2.0"
    saxonVersion = "13.0"
    spotbugsAnnotationVersion = "4.10.2"

    springbootMavenBomVersion = "4.1.0"
}

allprojects {
    apply plugin: 'maven-publish'
    apply plugin: 'java-library'
    apply plugin: 'idea'
    apply plugin: 'jacoco'

    group = 'se.inera.intyg.common'
    version = System.properties['buildVersion'] ?: '4.4.0-SNAPSHOT'

    java {
        toolchain {
            languageVersion = JavaLanguageVersion.of(25)
        }
    }

    dependencies {
        implementation platform("org.springframework.boot:spring-boot-dependencies:${springbootMavenBomVersion}")
        annotationProcessor platform("org.springframework.boot:spring-boot-dependencies:${springbootMavenBomVersion}")
        testAnnotationProcessor platform("org.springframework.boot:spring-boot-dependencies:${springbootMavenBomVersion}")

        implementation "ch.qos.logback:logback-classic"
        implementation "jakarta.annotation:jakarta.annotation-api"
        implementation "jakarta.jws:jakarta.jws-api:${jakartaJwsApiVersion}"
        implementation "jakarta.xml.ws:jakarta.xml.ws-api"
        implementation "tools.jackson.core:jackson-databind"

        testImplementation "com.sun.xml.messaging.saaj:saaj-impl"
        testImplementation "org.glassfish.jaxb:jaxb-runtime"
        testImplementation "org.springframework.boot:spring-boot-starter-test"
        testImplementation "org.xmlunit:xmlunit-core"
    }

    tasks.register('packageTests', Jar) {
        from sourceSets.test.output
        archiveClassifier.set('tests')
    }

    tasks.register('install') {
        description("Publishes artifact to local maven repository.")
        dependsOn(publishToMavenLocal)
    }

    artifacts.archives packageTests
    compileJava.options.encoding = 'UTF-8'
    jar { duplicatesStrategy = DuplicatesStrategy.EXCLUDE }

    repositories {
        mavenLocal()
        maven { url "https://nexus.drift.inera.se/repository/it-public/" }
        mavenCentral {
            content {
                excludeGroupByRegex "se\\.inera.*"
            }
        }
    }

    publishing {
        publications {
            maven(MavenPublication) {
                from components.java
            }
        }
        repositories.maven {
            url = uri("https://nexus.drift.inera.se/repository/maven-releases/")
            credentials {
                username = System.properties['ineraNexusUsername']
                password = System.properties['ineraNexusPassword']
            }
        }
    }

    idea {
        module {
            downloadJavadoc = true
        }
    }

    configurations {
        // Remove these due to conflict with Spring SAML which uses bcprov-jdk15.
        implementation.exclude group: "org.bouncycastle", module: "bcpkix-jdk15on"
        implementation.exclude group: "org.bouncycastle", module: "bcprov-jdk15on"
    }

    jacocoTestReport {
        dependsOn test

        reports {
            xml.required = true
            html.outputLocation = layout.buildDirectory.dir('jacocoHtml')
        }

        afterEvaluate {
            classDirectories.setFrom(files(classDirectories.files.collect {
                fileTree(dir: it, exclude: [
                        "**/testability/**",
                        "**/integrationtest/**"
                ])
            }))
        }
    }
}

subprojects {
    apply plugin: 'com.diffplug.spotless'

    configurations {
        mockitoAgent
    }

    dependencies {
        mockitoAgent platform("org.springframework.boot:spring-boot-dependencies:${springbootMavenBomVersion}")
        mockitoAgent("org.mockito:mockito-core") { transitive = false }
    }

    test {
        jvmArgs += [
                "-javaagent:${configurations.mockitoAgent.asPath}",
                "-Xshare:off"
        ]
    }

    testing.suites {
        test { useJUnitJupiter() }
    }

    spotless {
        java {
            target 'src/*/java/**/*.java'
            licenseHeaderFile(rootProject.file('spotless.license.txt'), 'package ')
            googleJavaFormat(googleJavaFormatVersion)
            removeUnusedImports()
            forbidWildcardImports()
            formatAnnotations()
        }
    }

    pluginManager.withPlugin('org.cyclonedx.bom') {
        tasks.named('cyclonedxDirectBom').configure { t ->
            t.includeConfigs = ['^runtimeClasspath$']
        }
    }
}

sonar {
    properties {
        property "sonar.projectKey", "intyg-common"
        property "sonar.projectName", "intyg-common"
    }
}

reporting {
    dependencies {
        subprojects.each { subproject ->
            testReportAggregation project(":${subproject.name}")
        }
    }
}